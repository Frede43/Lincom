<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Community Lab{% endblock %}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo {
            max-width: 200px;
            height: auto;
        }
        .content {
            background-color: #fff;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            font-size: 12px;
            color: #666;
        }
        .button {
            display: inline-block;
            padding: 10px 20px;
            background-color: #007bff;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
            margin: 15px 0;
        }
        .button:hover {
            background-color: #0056b3;
        }
        .cta-button {
            text-align: center;
            margin: 25px 0;
        }
        h2 {
            color: #007bff;
            margin-bottom: 20px;
        }
        ul {
            padding-left: 20px;
        }
        @media only screen and (max-width: 600px) {
            body {
                padding: 10px;
            }
            .content {
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <img src="{{ site_url }}{% static 'images/logo.png' %}" alt="Community Lab" class="logo">
    </div>
    
    <div class="content">
        {% block content %}{% endblock %}
    </div>
    
    <div class="footer">
        <p>Cet email a été envoyé par Community Lab</p>
        <p>© {% now "Y" %} Community Lab. Tous droits réservés.</p>
        <p>
            <a href="{{ site_url }}{% url 'privacy' %}">Politique de confidentialité</a> |
            <a href="{{ site_url }}{% url 'terms' %}">Conditions d'utilisation</a>
        </p>
    </div>
</body>
</html>
