{% extends "base.html" %}

{% block extra_css %}
<style>
    .startup-card {
        height: 100%;
        transition: transform 0.2s;
    }
    .startup-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    .startup-logo {
        width: 100%;
        height: 200px;
        object-fit: cover;
    }
    .startup-stats {
        font-size: 0.9rem;
    }
</style>
{% endblock %}

{% block content %}
<div class="container">
    <div class="row mb-4">
        <div class="col">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="{% url 'home' %}">Accueil</a></li>
                    {% block breadcrumb %}{% endblock %}
                </ol>
            </nav>
        </div>
    </div>
    
    {% block startup_content %}{% endblock %}
</div>
{% endblock %}
